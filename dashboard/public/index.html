<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowless Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #0f0f12;
      --surface: #1a1a1f;
      --border: #2a2a32;
      --text: #e4e4e7;
      --muted: #71717a;
      --success: #22c55e;
      --error: #ef4444;
      --accent: #6366f1;
    }
    body {
      margin: 0;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .live {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 50% { opacity: 0.5; } }
    .event-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .event-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(99, 102, 241, 0.08);
      border-bottom: 1px solid var(--border);
    }
    .event-source { font-weight: 600; color: var(--accent); }
    .event-type { color: var(--muted); }
    .event-time { margin-left: auto; color: var(--muted); font-size: 12px; }
    .event-payload {
      padding: 12px 16px;
      font-size: 12px;
      color: var(--muted);
      max-height: 80px;
      overflow: auto;
    }
    .event-payload pre { margin: 0; white-space: pre-wrap; }
    .actions {
      border-top: 1px solid var(--border);
    }
    .action {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .action:last-child { border-bottom: none; }
    .action-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .action-type { font-weight: 500; }
    .action-status {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }
    .action-status.success { background: rgba(34, 197, 94, 0.2); color: var(--success); }
    .action-status.error { background: rgba(239, 68, 68, 0.2); color: var(--error); }
    .action-status.pending { background: rgba(113, 113, 122, 0.3); color: var(--muted); }
    .action-reasoning {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .empty {
      text-align: center;
      padding: 48px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="live"></div>
      <h1>Flowless Dashboard</h1>
    </header>
    <div class="event-list" id="eventList"></div>
  </div>
  <script>
    const eventList = document.getElementById('eventList');
    const API = '/api/events';
    
    function statusClass(a) {
      if (a.success === true) return 'success';
      if (a.success === false) return 'error';
      return 'pending';
    }
    function statusIcon(a) {
      if (a.success === true) return '✓';
      if (a.success === false) return '✗';
      return '…';
    }
    
    function render(events) {
      if (!events.length) {
        eventList.innerHTML = '<div class="empty">Henüz event yok. GitHub push veya mock event bekleniyor.</div>';
        return;
      }
      eventList.innerHTML = events.map(ev => `
        <div class="event-card">
          <div class="event-header">
            <span class="event-source">${ev.source}</span>
            <span class="event-type">${ev.type}</span>
            <span class="event-time">${new Date(ev.timestamp).toLocaleString('tr-TR')}</span>
          </div>
          <div class="event-payload">
            <pre>${JSON.stringify(ev.payload, null, 2).slice(0, 500)}${JSON.stringify(ev.payload).length > 500 ? '…' : ''}</pre>
          </div>
          <div class="actions">
            ${(ev.actions || []).map(a => `
              <div class="action">
                <div class="action-header">
                  <span class="action-status ${statusClass(a)}">${statusIcon(a)}</span>
                  <span class="action-type">${a.type}</span>
                  <span style="color:var(--muted)">→ ${a.targetConnector}</span>
                </div>
                ${a.reasoning ? `<div class="action-reasoning">${a.reasoning}</div>` : ''}
                ${a.error ? `<div class="action-reasoning" style="color:var(--error)">${a.error}</div>` : ''}
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }
    
    async function fetchEvents() {
      try {
        const r = await fetch(API);
        const { events } = await r.json();
        render(events);
      } catch (e) {
        eventList.innerHTML = '<div class="empty">Bağlantı hatası.</div>';
      }
    }
    
    fetchEvents();
    setInterval(fetchEvents, 2000);
  </script>
</body>
</html>
