# Flowless Proje Konfigürasyonu

# Slack bildirimi (opsiyonel): SLACK_WEBHOOK_URL env değişkeni ile ayarla (.env dosyasında)
# slack.com/apps → Incoming WebHooks → Add to Slack → URL'yi .env'e ekle

project:
  name: flowless

# Aktif tool listesi — LLM'e sunulacak
tools:
  active:
    - log_event
    - update_ticket
    - create_comment
    - generate_doc
    - notify_team

# Branch kuralları — hangi branch'te hangi tool'lar çalışsın
branchRules:
  main:
    - generate_doc
    - notify_team
  develop:
    - log_event
    - create_comment

# Varsayılan (branch eşleşmezse)
default:
  - log_event
